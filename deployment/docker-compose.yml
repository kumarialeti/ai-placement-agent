version: "3.9"

services:
  # ─── Backend API ───
  backend:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    container_name: placement-agent-api
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    volumes:
      - ../data:/app/data
      - ../vector_db:/app/vector_db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Frontend ───
  frontend:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.frontend
    container_name: placement-agent-ui
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  # ─── ChromaDB (Optional standalone) ───
  chromadb:
    image: chromadb/chroma:latest
    container_name: placement-agent-chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped

volumes:
  chroma_data:
